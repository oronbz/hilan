<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Hilan Auto-Fill</h1>
    </header>

    <div class="field">
      <span class="label">Entry Time</span>
      <input type="text" id="entryTime" pattern="[0-2]\d:[0-5]\d" placeholder="09:00">
    </div>

    <div class="field">
      <span class="label">Exit Time</span>
      <input type="text" id="exitTime" pattern="[0-2]\d:[0-5]\d" placeholder="18:00">
    </div>

    <div class="radio-group">
      <span class="label">Flexi Sundays</span>
      <label><input type="radio" name="flexiSundays" value="none"> None</label>
      <label><input type="radio" name="flexiSundays" value="last" checked> Last Sunday of month</label>
      <label><input type="radio" name="flexiSundays" value="all"> All Sundays</label>
    </div>

    <div class="checkbox-field">
      <label><input type="checkbox" id="autoSave"> Auto-save after fill</label>
    </div>

    <button id="fillBtn" class="btn primary" disabled>Fill Now</button>
    <div id="status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
