<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
      color: #333;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #1a1a1a;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #555;
    }

    .field input[type="text"] {
      width: 80px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
    }

    .field input[type="text"]:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }

    .radio-group {
      margin-bottom: 12px;
    }

    .radio-group .group-label {
      font-weight: 500;
      margin-bottom: 6px;
      color: #555;
    }

    .radio-group label {
      display: block;
      padding: 2px 0;
      cursor: pointer;
      font-weight: normal;
    }

    .radio-group input[type="radio"] {
      margin-left: 6px;
    }

    .checkbox-field {
      margin-bottom: 14px;
    }

    .checkbox-field label {
      cursor: pointer;
      font-weight: normal;
    }

    .checkbox-field input[type="checkbox"] {
      margin-left: 6px;
    }

    #fillBtn {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #fillBtn:hover:not(:disabled) {
      background: #43A047;
    }

    #fillBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #777;
    }

    #status.error {
      color: #d32f2f;
    }

    #status.success {
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>Hilan Auto-Fill</h1>

  <div class="field">
    <label for="entryTime">שעת כניסה</label>
    <input type="text" id="entryTime" pattern="[0-2]\d:[0-5]\d" placeholder="09:00">
  </div>

  <div class="field">
    <label for="exitTime">שעת יציאה</label>
    <input type="text" id="exitTime" pattern="[0-2]\d:[0-5]\d" placeholder="18:00">
  </div>

  <div class="radio-group">
    <div class="group-label">פלקסי ביום ראשון</div>
    <label><input type="radio" name="flexiSundays" value="none"> ללא</label>
    <label><input type="radio" name="flexiSundays" value="last" checked> יום ראשון אחרון בלבד</label>
    <label><input type="radio" name="flexiSundays" value="all"> כל ימי ראשון</label>
  </div>

  <div class="checkbox-field">
    <label><input type="checkbox" id="autoSave"> שמירה אוטומטית אחרי מילוי</label>
  </div>

  <button id="fillBtn" disabled>מלא עכשיו</button>
  <div id="status">בודק...</div>

  <script src="popup.js"></script>
</body>
</html>
